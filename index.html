<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemon Shark — Midnight Sky</title>
    <style>
        :root {
            /* MIDNIGHT SKY COLOUR PALETTE */
            --bg-dark-space: radial-gradient(circle at center, #0c1445 0%, #06091f 70%, #020308 100%);
            --panel-glass: rgba(12, 20, 69, 0.45);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-cyan: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --border-sky: rgba(59, 130, 246, 0.25);
            
            --discord-dark: #0f172a;
            --tiktok-black: #020617;
        }

        body, html {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-dark-space);
            color: var(--text-main);
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Ambient starlight glow backdrop pattern */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.15) 1.5px, transparent 35px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 25px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.35;
            z-index: 1;
            pointer-events: none;
        }

        /* Top Auth Bar */
        .top-navbar {
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 60px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 24px;
            z-index: 100;
            gap: 12px;
        }
        .btn {
            padding: 9px 18px;
            border-radius: 8px;
            border: 1px solid var(--accent-cyan);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            background: rgba(30, 41, 59, 0.7);
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(4px);
        }
        .btn:hover {
            background-color: rgba(56, 189, 248, 0.15);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-1px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e40af 0%, #0369a1 100%);
            border: 1px solid #7dd3fc;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #1d4ed8 0%, #0284c7 100%);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .user-status {
            display: none;
            font-size: 14px;
            font-weight: 500;
            color: #34d399;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.3);
            padding: 6px 16px;
            border-radius: 16px;
            text-shadow: 0 0 10px rgba(52, 211, 153, 0.4);
        }

        /* Google Interface Viewport */
        .search-engine-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            background: transparent;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .logo {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 28px;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 40%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(56, 189, 248, 0.25));
        }
        .logo span {
            color: #38bdf8;
            -webkit-text-fill-color: initial;
            text-shadow: 0 0 20px var(--accent-glow);
        }
        .search-box-wrapper {
            width: 90%;
            max-width: 584px;
        }
        .search-input-field {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 24px;
            font-size: 16px;
            color: var(--text-main);
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-sky);
            border-radius: 24px;
            outline: none;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }
        .search-input-field:focus {
            box-shadow: 0 0 25px var(--accent-glow);
            border-color: #7dd3fc;
            background: rgba(15, 23, 42, 0.8);
        }

        /* Platform Hybrid Workspace Layout */
        .platform-workspace {
            display: none;
            height: 100vh;
            width: 100vw;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Discord Module */
        .discord-panel {
            width: 260px;
            background-color: var(--discord-dark);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-sky);
            height: 100%;
            z-index: 20;
            backdrop-filter: blur(10px);
        }
        .discord-header {
            padding: 18px 16px;
            font-weight: 700;
            font-size: 16px;
            border-bottom: 1px solid var(--border-sky);
            color: #fff;
            letter-spacing: 0.5px;
            background: rgba(30, 41, 59, 0.3);
        }
        .channel-directory {
            list-style: none;
            padding: 10px 8px;
            margin: 0;
            flex-grow: 1;
            overflow-y: auto;
        }
        .channel-node {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 15px;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }
        .channel-node::before {
            content: "🌌 ";
            font-size: 12px;
        }
        .channel-node:hover {
            background-color: rgba(56, 189, 248, 0.1);
            color: #fff;
        }
        .channel-node.active {
            background: linear-gradient(90deg, rgba(3, 105, 161, 0.4) 0%, rgba(56, 189, 248, 0.1) 100%);
            border-left: 3px solid var(--accent-cyan);
            color: #fff;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.15);
        }
        .upload-action-footer {
            padding: 16px;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid var(--border-sky);
            display: flex;
            justify-content: center;
        }

        /* TikTok Module */
        .tiktok-panel {
            flex-grow: 1;
            background-color: var(--tiktok-black);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 100%;
        }
        .video-viewport {
            width: 100%;
            max-width: 440px;
            height: 88vh;
            background: #020617;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--border-sky);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 25px rgba(56, 189, 248, 0.05);
        }
        .video-viewport video, .video-viewport img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Safe Mode Filter Toggle Overlay */
        .safety-filter-box {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(15, 23, 42, 0.85);
            padding: 12px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-sky);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            z-index: 50;
            backdrop-filter: blur(8px);
        }
        .switch-input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-cyan);
        }

        /* TikTok Navigation Controls */
        .feed-navigation-controls {
            position: absolute;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            color: white;
            z-index: 40;
        }
        .nav-circle-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--border-sky);
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }
        .nav-circle-btn:hover {
            background: rgba(56, 189, 248, 0.2);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: scale(1.05);
            object-fit: contain;
        }

        /* Safe Mode Filter Toggle Overlay */
        .safety-filter-box {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(15, 23, 42, 0.85);
            padding: 12px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-sky);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            z-index: 50;
            backdrop-filter: blur(8px);
        }
        .switch-input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-cyan);
        }

        /* TikTok Navigation Controls */
        .feed-navigation-controls {
            position: absolute;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            color: white;
            z-index: 40;
        }
        .nav-circle-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--border-sky);
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }
        .nav-circle-btn:hover {
            background: rgba(56, 189, 248, 0.2);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: scale(1.05);
        }
    </style>
    <script src="https://cloudflare.com" type="text/javascript"></script>
</head>
<body>

    <!-- Auth Elements -->
    <div class="top-navbar" id="globalNav">
        <span id="userBadge" class="user-status">🌌 Explorer Mode</span>
        <button id="loginButton" class="btn" onclick="executeAuthAction('login')">Log In</button>
        <button id="signupButton" class="btn btn-primary" onclick="executeAuthAction('signup')">Sign Up</button>
    </div>

    <!-- Google Style Dashboard Interface -->
    <div class="search-engine-view" id="googleHomepage">
        <div class="logo">Lemon <span>Shark</span></div>
        <div class="search-box-wrapper">
            <input type="text" class="search-input-field" id="mainSearchInput" placeholder="Search categories, tags, or servers..." onkeydown="if(event.key==='Enter') evaluateSearchQuery()">
        </div>
    </div>

    <!-- Hybrid Application Platform Workspace -->
    <div class="platform-workspace" id="mainAppWorkspace">
        
        <!-- Discord Module Panel Sidebar -->
        <div class="discord-panel">
            <div class="discord-header">🍋 Lemon Shark Channels</div>
            <ul class="channel-directory">
                <li class="channel-node active" id="chan-all" onclick="filterChannelScope('all')">all-feeds</li>
                <li class="channel-node" id="chan-videos" onclick="filterChannelScope('videos')">video-clips</li>
                <li class="channel-node" id="chan-photos" onclick="filterChannelScope('photos')">photo-dump</li>
            </ul>
            <div class="upload-action-footer">
                <button class="btn btn-primary" style="width: 100%;" onclick="mockUploadAsset()">✨ Sync Cosmic Asset</button>
            </div>
        </div>

        <!-- TikTok Content Stream Viewport -->
        <div class="tiktok-panel">
            <div class="video-viewport" id="mediaPlayerContainer">
                <img id="activeMediaAsset" src="https://unsplash.com" alt="Cosmic Background">
            </div>

            <!-- Feed Up/Down Nav Controls -->
            <div class="feed-navigation-controls">
                <button class="nav-circle-btn" onclick="stepMediaFeed('up')">▲</button>
                <button class="nav-circle-btn" onclick="stepMediaFeed('down')">▼</button>
            </div>

            <!-- Ambient Overlay Nebula Switch Filter -->
            <div class="safety-filter-box">
                <label for="safetyFilterCheckbox">Nebula Safe Filter</label>
                <input type="checkbox" id="safetyFilterCheckbox" class="switch-input" checked onchange="toggleSafetyFilter()">
            </div>
        </div>
    </div>

    <!-- SYSTEM CORE LOGIC APPLICATION SCRIPT -->
    <script>
        // System Application State Variables
        let currentFeedScope = 'all';
        let activeFeedIndex = 0;
        let userAuthenticated = false;

        // Space Theme Mock Media Library Data Source 
        const mediaLibrary = {
            all: [
                { type: 'image', url: 'https://unsplash.com' },
                { type: 'image', url: 'https://unsplash.com' },
                { type: 'image', url: 'https://unsplash.com' }
            ],
            videos: [
                { type: 'image', url: 'https://unsplash.com' }
            ],
            photos: [
                { type: 'image', url: 'https://unsplash.com' },
                { type: 'image', url: 'https://unsplash.com' }
            ]
        };

        // 1. Interactive Button Logic: User Login State Switcher
        function executeAuthAction(mode) {
            const loginBtn = document.getElementById('loginButton');
            const signupBtn = document.getElementById('signupButton');
            const userBadge = document.getElementById('userBadge');

            if (!userAuthenticated) {
                userAuthenticated = true;
                loginBtn.style.display = 'none';
                signupBtn.innerText = 'Log Out';
                signupBtn.classList.remove('btn-primary');
                userBadge.style.display = 'inline-block';
                userBadge.innerText = mode === 'login' ? '🌌 Welcome Back, Explorer!' : '✨ Registered Explorer';
            } else {
                userAuthenticated = false;
                loginBtn.style.display = 'inline-block';
                signupBtn.innerText = 'Sign Up';
                signupBtn.classList.add('btn-primary');
                userBadge.style.display = 'none';
            }
        }

        // 2. Search Logic: Animated Fade Transition out of Landing View into Main Workspace
        function evaluateSearchQuery() {
            const query = document.getElementById('mainSearchInput').value.trim();
            if (query === '') return;

            const homeView = document.getElementById('googleHomepage');
            const workspaceView = document.getElementById('mainAppWorkspace');

            homeView.style.opacity = '0';
            setTimeout(() => {
                homeView.style.display = 'none';
                workspaceView.style.display = 'flex';
                setTimeout(() => { workspaceView.style.opacity = '1'; }, 50);
            }, 400);
        }

        // 3. Sidebar Navigation Control Logic: Update Selected Scope Data Feeds
        function filterChannelScope(scope) {
            currentFeedScope = scope;
            activeFeedIndex = 0;

            document.querySelectorAll('.channel-node').forEach(node => {
                node.classList.remove('active');
            });
            document.getElementById(`chan-${scope}`).classList.add('active');

            renderActiveMediaItem();
        }

        // 4. Media Carousel Mechanics Engine: Traversing Up and Down Content Lists
        function stepMediaFeed(direction) {
            const activeList = mediaLibrary[currentFeedScope];
            if (!activeList || activeList.length === 0) return;
            
            if (direction === 'up') {
                activeFeedIndex = (activeFeedIndex - 1 + activeList.length) % activeList.length;
            } else {
                activeFeedIndex = (activeFeedIndex + 1) % activeList.length;
            }
            renderActiveMediaItem();
        }

        function renderActiveMediaItem() {
            const targetAsset = mediaLibrary[currentFeedScope][activeFeedIndex];
            const displayContainer = document.getElementById('mediaPlayerContainer');
            
            if (targetAsset) {
                displayContainer.innerHTML = `<img id="activeMediaAsset" src="${targetAsset.url}" alt="Sky Feed Asset">`;
                toggleSafetyFilter();
            }
        }

        // 5. CSS Effects Modifier Toggle: Ambient Shift Color Manipulations
        function toggleSafetyFilter() {
            const isFilterOn = document.getElementById('safetyFilterCheckbox').checked;
            const assetImg = document.getElementById('activeMediaAsset');
            
            if (assetImg) {
                assetImg.style.filter = isFilterOn ? 'none' : 'hue-rotate(140deg) saturate(1.8) contrast(1.1)';
            }
        }

        function mockUploadAsset() {
            alert("✨ Connecting to Space Station Cloud Node... Asset synchronised successfully.");
        }
    </script>
</body>
</html>
