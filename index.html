<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemon Shark — Media Hub</title>
    <style>
        :root {
            /* DEEP SPACE & PLATFORM COLOR PALETTE */
            --bg-dark-space: radial-gradient(circle at center, #0c1445 0%, #06091f 70%, #020308 100%);
            --yt-dark-bg: #0f172a;
            --panel-glass: rgba(15, 23, 42, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-cyan: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --border-sky: rgba(59, 130, 246, 0.25);
            
            --google-red: #ef4444;
            --google-blue: #3b82f6;
        }

        body, html {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-dark-space);
            color: var(--text-main);
            height: 100%;
            overflow: hidden;
        }

        /* Ambient starlight glow backdrop pattern */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.15) 1.5px, transparent 35px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 25px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.3;
            z-index: 1;
            pointer-events: none;
        }

        /* Global Header (Google/YouTube-Style Navbar) */
        .global-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 64px;
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid var(--border-sky);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .header-left .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            cursor: pointer;
        }
        .header-left .logo span { color: var(--accent-cyan); }

        /* Integrated Central Google-Style Search Field */
        .header-center {
            flex-grow: 1;
            max-width: 640px;
            margin: 0 20px;
        }
        .search-bar-container {
            display: flex;
            background: rgba(2, 6, 17, 0.8);
            border: 1px solid var(--border-sky);
            border-radius: 40px;
            overflow: hidden;
            padding: 2px;
        }
        .search-bar-container input {
            flex-grow: 1;
            border: none;
            background: transparent;
            padding: 10px 20px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
        }
        .search-btn {
            background: rgba(30, 41, 59, 0.8);
            border: none;
            color: var(--text-main);
            padding: 0 20px;
            cursor: pointer;
            border-left: 1px solid var(--border-sky);
        }
        .search-btn:hover { background: var(--accent-cyan); color: #000; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Button Blueprints */
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--accent-cyan);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            background: rgba(30, 41, 59, 0.7);
            color: var(--text-main);
            transition: all 0.2s ease;
        }
        .btn:hover {
            box-shadow: 0 0 12px var(--accent-glow);
            transform: translateY(-1px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e40af 0%, #0369a1 100%);
            border: 1px solid #7dd3fc;
        }

        /* Authentication Dropdown Modal Layouts */
        .auth-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 6, 17, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .auth-card {
            background: #0f172a;
            border: 1px solid var(--border-sky);
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            position: relative;
        }
        .auth-card h3 { margin-top: 0; font-size: 24px; color: var(--text-main); }
        .auth-input-group { margin-bottom: 20px; }
        .auth-input-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .auth-input-group input {
            width: 100%; box-sizing: border-box; padding: 12px;
            background: rgba(2, 6, 17, 0.6); border: 1px solid var(--border-sky);
            border-radius: 8px; color: #fff; outline: none;
        }
        .auth-input-group input:focus { border-color: var(--accent-cyan); }
        .close-auth {
            position: absolute; top: 16px; right: 16px; background: transparent;
            border: none; color: var(--text-muted); font-size: 18px; cursor: pointer;
        }

        /* YouTube Platform Main Multi-View Panel Interface */
        .main-container {
            display: flex;
            margin-top: 64px;
            height: calc(100vh - 64px);
            position: relative;
            z-index: 2;
        }

        /* Left-Hand Navigation Sidebar Drawer */
        .sidebar-drawer {
            width: 240px;
            background: rgba(15, 23, 42, 0.4);
            border-right: 1px solid var(--border-sky);
            display: flex;
            flex-direction: column;
            padding: 12px;
            box-sizing: border-box;
            backdrop-filter: blur(8px);
        }
        .sidebar-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.2s ease;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(56, 189, 248, 0.1);
            color: var(--text-main);
        }
        .sidebar-divider {
            height: 1px; background: var(--border-sky); margin: 12px 0;
        }
        .sidebar-section-title {
            font-size: 12px; font-weight: 700; color: var(--accent-cyan);
            padding-left: 16px; text-transform: uppercase; margin-bottom: 8px;
        }

        /* Center Video Feed Workspace Grid Content Area */
        .content-workspace {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            background: rgba(2, 6, 17, 0.2);
        }

        /* YouTube Grid Layout Structure */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .video-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-sky);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border-color: var(--accent-cyan);
        }
        .thumbnail-box {
            width: 100%; aspect-ratio: 16/9; background: #020617;
            position: relative; overflow: hidden;
        }
        .thumbnail-box img { width: 100%; height: 100%;             object-fit: cover; 
        }
        .video-duration {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px;
            font-size: 11px; font-weight: 600;
        }
        .video-meta-info { padding: 16px; display: flex; gap: 12px; }
        .channel-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--accent-cyan); flex-shrink: 0;
        }
        .video-details h4 { margin: 0 0 6px 0; font-size: 14px; line-height: 1.4; color: var(--text-main); }
        .video-details p { margin: 0; font-size: 12px; color: var(--text-muted); }

        /* Channel Control Dashboard Overlay Wrapper */
        .dashboard-view { display: none; }
        .create-channel-box {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--border-sky);
            border-radius: 16px; padding: 24px; max-width: 500px; margin-bottom: 32px;
        }
    </style>
</head>
<body>

    <!-- 1. GOOGLE/YOUTUBE LAYOUT NAVIGATION HEADER BAR -->
    <header class="global-header">
        <div class="header-left">
            <div class="logo" onclick="switchViewSection('home')">Lemon <span>Shark</span></div>
        </div>
        <div class="header-center">
            <div class="search-bar-container">
                <input type="text" id="globalSearchInput" placeholder="Search creators, videos, channels...">
                <button class="search-btn" onclick="executeSearchFilter()">🔍</button>
            </div>
        </div>
        <div class="header-right">
            <button id="navCreateBtn" class="btn" style="display:none;" onclick="switchViewSection('dashboard')">➕ Create</button>
            <span id="userProfileTag" class="btn" style="display:none; border-color:#34d399;"></span>
            <button id="loginModalTrigger" class="btn btn-primary" onclick="openAuthenticationModal()">Sign In</button>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar Navigation Drawer -->
        <aside class="sidebar-drawer">
            <div class="sidebar-item active" id="side-home" onclick="switchViewSection('home')">🏠 Home</div>
            <div class="sidebar-item" id="side-subs" onclick="alert('Subscription index feeds connecting soon!')">🔔 Subscriptions</div>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section-title">Channels Workspace</div>
            <div class="sidebar-item" id="side-dash" onclick="switchViewSection('dashboard')">⚙️ Manage Channels</div>
            <div id="dynamicChannelsMenu"></div>
        </aside>

        <!-- Main Video Grid Feed Workspace Area -->
        <main class="content-workspace">
            <div id="homeFeedsWorkspace" class="view-panel">
                <h3 style="margin-top:0; letter-spacing: 0.5px; font-size:20px;">Recommended Space Feeds</h3>
                <div class="video-grid" id="youtubeVideoGrid"></div>
            </div>

            <!-- YouTube Dashboard Operations Panel -->
            <div id="creatorDashboardWorkspace" class="view-panel dashboard-view">
                <h3 style="margin-top:0;">Creator Space Control Room</h3>
                
                <div class="create-channel-box">
                    <h4 style="margin-top:0; color: var(--accent-cyan);">🚀 Provision New Content Channel</h4>
                    <div class="auth-input-group">
                        <label>Channel Identity Label Name</label>
                        <input type="text" id="newChannelNameInput" placeholder="e.g. Orion Nebula Records">
                    </div>
                    <button class="btn btn-primary" onclick="createNewUserChannel()">Establish Channel Node</button>
                </div>

                <h3>Your Established Channel Networks</h3>
                <div class="video-grid" id="userChannelsGrid">
                    <p style="color:var(--text-muted); font-style:italic;">Sign in to unlock space network channel privileges.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Multi-Mode Email Sign-Up Framework Modal Overlay -->
    <div class="auth-overlay" id="authGatewayOverlay">
        <div class="auth-card">
            <button class="close-auth" onclick="closeAuthenticationModal()">✕</button>
            <h3 id="authTitleLabel">Sign Into Lemon Shark</h3>
            
            <div class="auth-input-group">
                <label>Email Address Path</label>
                <input type="email" id="authEmailInput" placeholder="explorer@lemonshark.space">
            </div>
            <div class="auth-input-group">
                <label>Security Key Access Token</label>
                <input type="password" id="authPasswordInput" placeholder="••••••••">
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:28px;">
                <span id="authToggleHint" style="font-size:12px; color:var(--accent-cyan); cursor:pointer;" onclick="toggleAuthMethodMode()">Need an account? Sign Up</span>
                <button class="btn btn-primary" id="authSubmitActionBtn" onclick="processAuthSubmission()">Enter Hub</button>
            </div>
        </div>
    </div>

    <!-- APPLICATION PLATFORM ARCHITECTURE ENGINE SCRIPT -->
    <script>
        // System Memory State Storage
        let currentAuthMode = 'login';
        let authenticatedUser = null;
        
        // Initial Default Database Media Array Collections 
        const planetaryVideoDatabase = [
            { id: 1, title: "Deep Dive: Navigating The Crab Nebula Cosmic Arrays", creator: "Orion Observatory", views: "340K views", age: "2 days ago", duration: "14:22", thumb: "https://unsplash.com" },
            { id: 2, title: "How James Webb Fixed Chromatic Space Leak Variables", creator: "Stellar Labs", views: "1.2M views", age: "1 week ago", duration: "08:45", thumb: "https://unsplash.com" },
            { id: 3, title: "Synthesizing Ambient Space Pulsar Sound Waves", creator: "Radio Telecoms", views: "89K views", age: "5 hours ago", duration: "45:10", thumb: "https://unsplash.com" }
        ];

        // User Custom Channel Configuration Mappings Dictionary Registry
        let systemChannelsRegistry = {};

        // Instantiate App Components on Window Finish Execution
        window.addEventListener('DOMContentLoaded', () => {
            renderMediaGridWorkspace(planetaryVideoDatabase);
        });

        // 1. Core Structural View Navigation Controllers Logic Multiplexing
        function switchViewSection(targetPanelId) {
            const homePanel = document.getElementById('homeFeedsWorkspace');
            const dashPanel = document.getElementById('creatorDashboardWorkspace');
            
            document.getElementById('side-home').classList.remove('active');
            document.getElementById('side-dash').classList.remove('active');

            if (targetPanelId === 'home') {
                homePanel.style.display = 'block';
                dashPanel.style.display = 'none';
                document.getElementById('side-home').classList.add('active');
            } else if (targetPanelId === 'dashboard') {
                homePanel.style.display = 'none';
                dashPanel.style.display = 'block';
                document.getElementById('side-dash').classList.add('active');
                renderUserOwnedChannels();
            }
        }

        // 2. Grid UI Document Object Model Node Injector
        function renderMediaGridWorkspace(dataset) {
            const gridContainer = document.getElementById('youtubeVideoGrid');
            gridContainer.innerHTML = '';

            if (dataset.length === 0) {
                gridContainer.innerHTML = `<p style="color:var(--text-muted); padding-left:16px;">No cosmic records match your parameters query.</p>`;
                return;
            }

            dataset.forEach(item => {
                gridContainer.innerHTML += `
                    <div class="video-card" onclick="alert('Buffering stream feed: ${item.title}')">
                        <div class="thumbnail-box">
                            <img src="${item.thumb}" alt="Space Content">
                            <div class="video-duration">${item.duration}</div>
                        </div>
                        <div class="video-meta-info">
                            <div class="channel-avatar"></div>
                            <div class="video-details">
                                <h4>${item.title}</h4>
                                <p>${item.creator}</p>
                                <p>${item.views} • ${item.age}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 3. Search Bar Filter Parser
        function executeSearchFilter() {
            const queryToken = document.getElementById('globalSearchInput').value.toLowerCase().trim();
            const matchedFilterList = planetaryVideoDatabase.filter(video => 
                video.title.toLowerCase().includes(queryToken) || 
                video.creator.toLowerCase().includes(queryToken)
            );
            switchViewSection('home');
            renderMediaGridWorkspace(matchedFilterList);
        }

        // 4. Multi-State Email Identity Handlers
        function openAuthenticationModal() {
            document.getElementById('authGatewayOverlay').style.display = 'flex';
        }
        function closeAuthenticationModal() {
            document.getElementById('authGatewayOverlay').style.display = 'none';
        }

        function toggleAuthMethodMode() {
    const labelTitle = document.getElementById('authTitleLabel');
    const submitBtn = document.getElementById('authSubmitActionBtn');
    const hintToggle = document.getElementById('authToggleHint');
    
    if (currentAuthMode === 'login') {
        currentAuthMode = 'signup';
        labelTitle.innerText = "Register Space Account";
        submitBtn.innerText = "Create Identity";
        hintToggle.innerText = "Already an Explorer? Log In";
    } else {
        currentAuthMode = 'login';
        labelTitle.innerText = "Sign Into Lemon Shark";
        submitBtn.innerText = "Enter Hub";
        hintToggle.innerText = "Need an account? Sign Up";
    }
}

function processAuthSubmission() {
    const targetEmail = document.getElementById('authEmailInput').value.trim();
    const targetPassword = document.getElementById('authPasswordInput').value.trim();
    
    if (!targetEmail || !targetPassword) {
        alert("Authentication paths require valid character assignments.");
        return;
    }
    
    authenticatedUser = targetEmail;
    if (!(authenticatedUser in systemChannelsRegistry)) {
        systemChannelsRegistry[authenticatedUser] = [];
    }
    
    document.getElementById('loginModalTrigger').style.display = 'none';
    document.getElementById('navCreateBtn').style.display = 'inline-block';
    
    const profileDisplay = document.getElementById('userProfileTag');
    profileDisplay.style.display = 'inline-block';
    profileDisplay.innerText = `🛸 ${targetEmail.split('@')[0].toUpperCase()}`;
    
    closeAuthenticationModal();
    renderUserOwnedChannels();
    rebuildDynamicSidebarMenu();
    alert("Authenticated identity parameters locked safely to system configuration array node!");
}

// 5. Creator Suite Structural Channel Generator Routing
function createNewUserChannel() {
    if (!authenticatedUser) {
        alert("System network authentication session required to provision channels.");
        return;
    }
    
    const requestedChannelTitle = document.getElementById('newChannelNameInput').value.trim();
    if (!requestedChannelTitle) {
        alert("Channels must contain structural identifiers naming assignments rules.");
        return;
    }
    
    systemChannelsRegistry[authenticatedUser].push({
        name: requestedChannelTitle,
        subscribers: "0 Subscribers",
        networkHub: "Active Station"
    });
    
    document.getElementById('newChannelNameInput').value = '';
    renderUserOwnedChannels();
    rebuildDynamicSidebarMenu();
    alert(`Channel target workspace context established cleanly: [${requestedChannelTitle}]`);
}

function renderUserOwnedChannels() {
    const gridDashboard = document.getElementById('userChannelsGrid');
    
    if (!authenticatedUser) {
        gridDashboard.innerHTML = `<p style="color:var(--text-muted); font-style:italic;">Sign in using your Email Profile to map cosmic channels workspace.</p>`;
        return;
    }
    
    const currentScopeChannels = systemChannelsRegistry[authenticatedUser] || [];
    gridDashboard.innerHTML = '';
    
    if (currentScopeChannels.length === 0) {
        gridDashboard.innerHTML = `<p style="color:var(--text-muted);">You have not provisioned any studio creator channels networks nodes yet.</p>`;
        return;
    }
    
    currentScopeChannels.forEach(chan => {
        gridDashboard.innerHTML += `
            <div class="video-card" style="padding:20px; text-align:center;" onclick="alert('Opening dashboard node pipeline for system network: ${chan.name}')">
                <div class="channel-avatar" style="margin: 0 auto 12px auto; width:64px; height:64px; background:linear-gradient(45deg, #0284c7, #38bdf8);"></div>
                <h4 style="margin:0 0 4px 0;">${chan.name}</h4>
                <p style="margin:0; font-size:12px; color:var(--text-muted);">${chan.subscribers} • ${chan.networkHub}</p>
            </div>`;
    });
}

function rebuildDynamicSidebarMenu() {
    const dynamicDrawerList = document.getElementById('dynamicChannelsMenu');
    dynamicDrawerList.innerHTML = '';
    
    if (!authenticatedUser) return;
    const operationalList = systemChannelsRegistry[authenticatedUser] || [];
    
    operationalList.forEach(chan => {
        dynamicDrawerList.innerHTML += `
            <div class="sidebar-item" style="padding-left:24px; font-size:13px; color:#bae6fd;" onclick="alert('Opening workspace connection pipeline matching: ${chan.name}')">
                📺 ${chan.name}
            </div>`;
    });
}
